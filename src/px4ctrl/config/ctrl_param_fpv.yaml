#########################################################################
# ⭐⭐⭐  Set parameters carefully for satisfied performance!   ⭐⭐⭐ #
#########################################################################

mass        : 1.233 # kg 
gra         : 9.81 
pose_solver : 1    # 1:From ZhepeiWang, 2:From rotor-drag    
ctrl_freq_max   : 100.0
max_manual_vel: 2.0
max_angle: 80  # Attitude angle limit in degree. A negative value means no limit.
low_voltage: 14.0 # 4S battery

rc_reverse: # *
    roll: false
    pitch: true
    yaw: false
    throttle: true

auto_takeoff_land:
    enable: true
    enable_auto_arm: true
    no_RC: false
    takeoff_height: 0.5 # m
    takeoff_land_speed: 0.2 # m/s

thrust_model: # The model that maps thrust signal u(0~1) to real thrust force F(Unit:N): F=K1*Voltage^K2*(K3*u^2+(1-K3)*u). 
    print_value: false # display the value of “thr_scale_compensate” or “hover_percentage” during thrust model estimating.
    accurate_thrust_model: false  # This can always enabled if don't require accurate control performance :-)
    noisy_imu: false
    # accurate thrust mapping parameters
    K1: 2.10  # Needs precise calibration!
    K2: 1.0 # Needs precise calibration!
    K3: 0.0 # Needs precise calibration! K3 equals THR_MDL_FAC in https://docs.L_Ctrl.io/master/en/config_mc/pid_tuning_guide_multicopter.html.
    # approximate thrust mapping parameters
    hover_percentage: 0.5 # Thrust percentage in Stabilize/Arco mode # *

gain: 
    # Cascade PID controller. Recommend to read the code.
    Kp0: 3.7    #3.7
    Kp1: 3.5    #3.5
    Kp2: 3.0
    Kv0: 4.5       #4.5
    Kv1: 4.5       #4.5
    Kv2: 4.5
    # ↓↓↓ No use now --
    Kvi0: 0.0
    Kvi1: 0.0
    Kvi2: 0.0
    Kvd0: 0.0
    Kvd1: 0.0
    Kvd2: 0.0
    # ↓↓↓ Only used in rate control mode.
    KAngR: 20.0
    KAngP: 20.0
    KAngY: 4.0

rotor_drag:  
    x: 0.0  # The reduced acceleration on each axis caused by rotor drag. Unit:(m*s^-2)/(m*s^-1).
    y: 0.0  # Same as above
    z: 0.0  # Same as above
    k_thrust_horz: 0.0 # Set to 0 recommended... --

msg_timeout:
    odom: 0.5
    rc:   0.5
    cmd:  0.5
    imu:  0.5
    bat:  0.5

# ===============================================
# Online Gaussian Process (Online GP) Parameters
# ===============================================
online_gp:
  l: 0.5               # Lengthscale
  sigma_f: 1.0         # Signal variance
  beta: 2.0            # Confidence scaling factor
  N_max: 50            # Sliding window size

# ===============================================
# Robust Tube-based MPC (RTMPC) Parameters
# ===============================================
rtmpc:
  dt: 0.05             # Prediction step size
  H: 20                # Prediction horizon length

  # X/Y axis parameters
  xy:
    Q_p: 10.0          # Position tracking penalty
    Q_v: 1.0           # Velocity tracking penalty
    R: 0.1             # Control input penalty
    Q_anc_p: 20.0      # Ancillary LQR position penalty
    Q_anc_v: 2.0       # Ancillary LQR velocity penalty
    R_anc: 0.01        # Ancillary LQR control penalty
    limit_p: 2.0       # State tube base bound (position)
    limit_v: 2.0       # State tube base bound (velocity)
    limit_u_min: -3.0  # Control lower bound
    limit_u_max: 3.0   # Control upper bound

  # Z axis parameters
  z:
    Q_p: 15.0
    Q_v: 2.0
    R: 0.5
    Q_anc_p: 30.0
    Q_anc_v: 5.0
    R_anc: 0.01
    limit_p: 1.5
    limit_v: 1.0
    limit_u_min: -2.0
    limit_u_max: 5.0

# ===============================================
# Controller Selection
# ===============================================
controller:
  use_mpc: true        # true: RTMPC, false: Uncertainty-Aware PID
  ua_pid_alpha: 0.5    # Tuning scalar for uncertainty-aware gain scheduling